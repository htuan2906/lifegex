name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_TRANSLATION_API_URL: ${{ secrets.VITE_TRANSLATION_API_URL }}
          VITE_TRANSLATION_API_KEY: ${{ secrets.VITE_TRANSLATION_API_KEY }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_IMAGE_CDN_URL: ${{ secrets.VITE_IMAGE_CDN_URL }}
          VITE_CONTACT_API: ${{ secrets.VITE_CONTACT_API }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
